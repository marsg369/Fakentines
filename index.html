<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fakentines 💌</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Georgia, serif;
      background: radial-gradient(circle at top, #ffe6f0, #fff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    #petals-layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .card {
      position: relative;
      z-index: 2;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      padding: 40px 25px;
      border-radius: 25px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      max-width: 400px;
      width: 90%;
    }

    h1 {
      font-size: 1.9rem;
      margin-bottom: 20px;
      color: #4b1e2f;
    }

    .buttons {
      margin-top: 20px;
      position: relative;
      height: 80px;
    }

    button {
      border: none;
      border-radius: 30px;
      padding: 12px 25px;
      margin: 10px;
      font-size: 1rem;
      cursor: pointer;
      position: absolute;
      transition: all 0.3s ease;
    }

    .yes {
      background: #d6336c;
      color: white;
      left: 20%;
    }

    .yes:hover {
      transform: scale(1.08);
    }

    .no {
      background: #eee;
      left: 55%;
    }

    .message {
      margin-top: 25px;
      font-size: 1.4rem;
      font-weight: bold;
      color: #3a0f1f;
      opacity: 0;
      transition: opacity 1s ease;
      min-height: 52px;
    }

    .show {
      opacity: 1;
    }

    .bouquet {
      font-size: 3rem;
      margin-bottom: 10px;
      opacity: 0;
      transform: scale(0.5);
      transition: all 1s ease;
    }

    .bouquet.show {
      opacity: 1;
      transform: scale(1.2);
    }

    .petal {
      position: absolute;
      top: -20px;
      animation: fall linear infinite;
      opacity: 0.85;
      will-change: transform;
      user-select: none;
    }

    @keyframes fall {
      0% {
        transform: translateY(-20px) rotate(0deg);
      }
      100% {
        transform: translateY(110vh) rotate(360deg);
      }
    }

    #gif {
      margin-top: 20px;
      display: none;
      border-radius: 12px;
      width: 150px;
      max-width: 100%;
    }
  </style>
</head>

<body>
  <div id="petals-layer"></div>

  <div class="card">
    <div id="bouquet" class="bouquet">🌹💐🌹</div>

    <h1>Will you be my Fakentine, Nalini? 💖</h1>

    <div class="buttons">
      <button class="yes" onclick="showYes()">Yes ❤️</button>
      <button id="noBtn" class="no">No 👀</button>
    </div>

    <div id="message" class="message"></div>

    <img
      id="gif"
      src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif"
      alt="Dancing teddy bear"
    />
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const petalsLayer = document.getElementById("petals-layer");

    noBtn.addEventListener("mouseover", () => {
      const buttons = document.querySelector(".buttons");
      const maxX = buttons.clientWidth - noBtn.offsetWidth;
      const maxY = buttons.clientHeight - noBtn.offsetHeight;

      const x = Math.max(0, Math.random() * maxX);
      const y = Math.max(0, Math.random() * maxY);

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    });

    function showYes() {
      document.getElementById("message").innerHTML =
        "I loved you yesterday, I love you today, I'll love you forever Nalini ∞. Happy Fakentines 🖤🌹";
      document.getElementById("message").classList.add("show");

      document.getElementById("bouquet").classList.add("show");
      document.getElementById("gif").style.display = "block";

      startPetals();
    }

    function startPetals() {
      for (let i = 0; i < 35; i++) {
        const petal = document.createElement("div");
        petal.className = "petal";
        petal.textContent = "🌹";
        petal.style.left = Math.random() * 100 + "vw";
        petal.style.animationDuration = (3 + Math.random() * 4) + "s";
        petal.style.fontSize = (16 + Math.random() * 20) + "px";
        petal.style.animationDelay = Math.random() * 1.5 + "s";
        petalsLayer.appendChild(petal);
      }
    }
  </script>
</body>
</html>
